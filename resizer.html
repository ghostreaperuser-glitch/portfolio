<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Resizer</title>
</head>
<body>
  <h2>Upload an image to resize</h2>
  <input type="file" id="upload" accept="image/*" />
  <div id="downloads"></div>

  <script>
    document.getElementById('upload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          [192, 512].forEach(size => {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, size, size);
            const link = document.createElement('a');
            link.download = `icon_${size}x${size}.png`;
            link.href = canvas.toDataURL();
            link.textContent = `Download ${size}×${size}`;
            document.getElementById('downloads').appendChild(link);
            document.getElementById('downloads').appendChild(document.createElement('br'));
          });
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
